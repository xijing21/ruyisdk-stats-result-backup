name: Stats & Screenshot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24

on:
  schedule:
    - cron: '0 1 * * 2'      # 每周二 UTC 01:00（北京时间 09:00）
    - cron: '0 16 28-31 * *'  # 每月 28-31 日 UTC 16:00（北京时间次日 00:00）
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # 明确指定 Node.js 24
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run screenshot script
        run: node web-stats/screenshot.mjs
        env:
          VSM_COOKIE: ${{ secrets.VSM_COOKIE }}

      - name: Create ~/.netrc for ES auth
        run: |
          cat > ~/.netrc <<'NETRC_EOF'
          ${{ secrets.ES_NETRC }}
          NETRC_EOF
          chmod 600 ~/.netrc

      - name: Run statistics script
        run: bash web-stats/ruyisdk_stats.sh
        env:
          RESULT_DIR: ${{ steps.result_dir.outputs.dir }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PEPY_API_KEY: ${{ secrets.PEPI_API_KEY }}

      - name: Get result directory
        id: result_dir
        run: echo "dir=$(cat web-stats/result_dir.txt)" >> $GITHUB_OUTPUT

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add web-stats/results-weekly web-stats/results-monthly
          git diff --staged --quiet || git commit -m "📊 自动采集: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
