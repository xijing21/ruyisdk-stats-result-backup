name: Stats & Screenshot

on:
  schedule:
    # 每周二 UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * 2'
    # 每月 28-31 日 UTC 16:00 = 北京时间次日 00:00（即当月最后一天 24:00）
    # 脚本内部会判断是否真的是最后一天
    - cron: '0 16 28-31 * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run screenshot script
        run: node web-stats/screenshot.mjs
        env:
          VSM_COOKIE: ${{ secrets.VSM_COOKIE }}

      - name: Create ~/.netrc for ES auth
        run: |
          cat > ~/.netrc <<'NETRC_EOF'
          ${{ secrets.ES_NETRC }}
          NETRC_EOF
          chmod 600 ~/.netrc

      - name: Run statistics script
        run: bash web-stats/ruyisdk_stats.sh
        env:
          RESULT_DIR: ${{ steps.result_dir.outputs.dir }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}

      - name: Get result directory
        id: result_dir
        run: echo "dir=$(cat web-stats/result_dir.txt)" >> $GITHUB_OUTPUT

      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add web-stats/results-weekly web-stats/results-monthly
          git diff --staged --quiet || git commit -m "📊 自动采集: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
