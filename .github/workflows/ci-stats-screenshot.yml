name: Stats & Screenshot

on:
  schedule:
    - cron: '0 1 * * 2'      # 每周二 UTC 01:00（北京时间 09:00）
    - cron: '0 16 28-31 * *' # 每月 28-31 日 UTC 16:00
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ==========================================
      # 1. 检出代码（使用 fetch-depth: 0 确保有完整历史，支持 git push）
      # ==========================================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          
          token: ${{ secrets.GITHUB_TOKEN }} 

      # ==========================================
      # 2. 配置 Git
      # ==========================================
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ==========================================
      # 3. 初始化 Node.js 项目 & 安装 Playwright
      # ==========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'    

      - name: Install Playwright
        working-directory: web-stats 
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      # ==========================================
      # 4. 创建 ~/.netrc（ES 认证）
      # ==========================================
      - name: Create ~/.netrc for ES auth
        run: |
          cat > ~/.netrc <<'NETRC_EOF'
          ${{ secrets.ES_NETRC }}
          NETRC_EOF
          chmod 600 ~/.netrc

      # ==========================================
      # 5. 运行截图脚本（生成 result_dir.txt）
      # ==========================================
      - name: Run screenshot script
        working-directory: web-stats
        run: node screenshot.mjs
        env:
          VSM_COOKIE: ${{ secrets.VSM_COOKIE }}

      # ==========================================
      # 6. 读取结果目录 & 运行统计脚本
      # ==========================================
      - name: Get result directory
        id: result_dir
        run: |
          echo "dir=$(cat web-stats/result_dir.txt)" >> $GITHUB_OUTPUT
          echo "Result directory: $(cat web-stats/result_dir.txt)"

      - name: Run statistics script
        working-directory: web-stats
        run: bash ruyisdk_stats.sh
        env:
          RESULT_DIR: ${{ steps.result_dir.outputs.dir }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          PEPY_API_KEY: ${{ secrets.PEPY_API_KEY }}

      # ==========================================
      # 7. 提交并推送结果
      # ==========================================
      - name: Commit and push results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   
        run: |
          # 确保在仓库根目录
          cd $GITHUB_WORKSPACE
          
          # 检查 git 状态
          git status
          git remote -v
          
          # 添加结果文件
          git add -A
          
          # 如果有变更则提交并推送
          if ! git diff --staged --quiet; then
            git commit -m "📊 自动采集: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # 使用完整的推送命令，指定远程和分支
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit"
          fi